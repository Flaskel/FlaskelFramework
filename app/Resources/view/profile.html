{% extends "layout/base.html" %}

{% block content %}
<div class="p-5">

    <!-- Breadcrumb -->
    <ul class="flex space-x-2 mb-5">
        <li>
            <a href="/dashboard" class="text-primary hover:underline">Dashboard</a>
        </li>
        <li class="before:content-['/'] before:mx-2"> Profile</li>
    </ul>

    {% include "components/session-message.html" %}

    <!-- ===================== -->
    <!-- BASIC DETAILS FORM -->
    <!-- ===================== -->
    <div class="panel mb-6">
        <h2 class="text-lg font-semibold mb-4">Basic Detail</h2>

        <form method="POST" action="/profile/update" class="space-y-4">

            <!-- NAME -->
            <div>
                <label class="block mb-1 font-semibold">Name</label>
                <input type="text" name="name"
                       value="{{ current_user.name }}"
                       class="form-input w-full" required>
            </div>

            <!-- EMAIL -->
            <div>
                <label class="block mb-1 font-semibold">Email</label>
                <input type="email" name="email"
                       value="{{ current_user.email }}"
                       class="form-input w-full" required>
            </div>

            <!-- MOBILE -->
            <div>
                <label class="block mb-1 font-semibold">Mobile</label>
                <input type="text" name="mobile"
                       value="{{ current_user.mobile }}"
                       class="form-input w-full">
            </div>

            <!-- BUTTONS -->
            <div class="flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a href="/dashboard" class="btn btn-outline-primary">Cancel</a>
            </div>

        </form>
    </div>

    <!-- ===================== -->
    <!-- PASSWORD FORM -->
    <!-- ===================== -->
    <div class="panel">
        <h2 class="text-lg font-semibold mb-4">Update Password</h2>

        <form method="POST" action="/profile/password" class="space-y-4">

            <!-- CURRENT PASSWORD -->
            <div>
                <label class="block mb-1 font-semibold">Current Password</label>
                <input type="password" name="current_password"
                       placeholder="Enter Your Old Password"
                       class="form-input w-full" required>
            </div>

            <!-- NEW PASSWORD -->
            <div>
                <label class="block mb-1 font-semibold">New Password</label>
                <input type="password" name="new_password"
                       placeholder="Enter Your New Password"
                       class="form-input w-full" required>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div>
                <label class="block mb-1 font-semibold">Confirm Password</label>
                <input type="password" name="confirm_password"
                       placeholder="Confirm Your New Password"
                       class="form-input w-full" required>
            </div>

            <!-- BUTTONS -->
            <div class="flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary">Update Password</button>
                <a href="/dashboard" class="btn btn-outline-primary">Cancel</a>
            </div>

        </form>
    </div>

</div>
{% endblock %}
